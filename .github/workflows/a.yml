name: build-arm-deb

on:
  workflow_dispatch:

jobs:
  build-arm64:
    name: Build .deb for arm64 (via Docker+QEMU)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch Docker)
        uses: docker/setup-qemu-action@v2

      - name: Enable Docker experimental (for --platform) (no-op on GH hosted but kept for clarity)
        run: |
          echo "docker and qemu ready"

      - name: Build inside arm64 container
        # use node base image; we'll apt install needed libs inside the container
        run: |
          docker run --rm --platform=linux/arm64 \
            -v "${{ github.workspace }}":/work -w /work \
            node:18-bullseye /bin/bash -s <<'BASH'
          set -euo pipefail

          apt-get update && apt-get install -y --no-install-recommends \
            build-essential git curl ca-certificates python3 pkg-config \
            libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2 \
            libx11-dev libxkbfile-dev libsecret-1-dev libssl-dev \
            libsqlite3-dev libvips-dev

          npm config set python /usr/bin/python3
          npm ci --no-audit --progress=false

          # 在容器内求出 electron 版本并重建原生模块
          ELECTRON_VERSION="$(node -e 'const p=require(\"./package.json\"); console.log((p.devDependencies && p.devDependencies.electron) || (p.dependencies && p.dependencies.electron))')"
          npx electron-rebuild --force --parallel --version "${ELECTRON_VERSION}"

          # set env so electron-forge will make linux/arm64 artifacts
          npm_config_platform=linux npm_config_arch=arm64 npm run make
BASH
        timeout-minutes: 90

      - name: Find .deb artifacts
        run: |
          echo "Looking for .deb files under out/ and ./out/make"
          find out -type f -name "*.deb" || find . -type f -name "*.deb" || true

      - name: Upload .deb(s) as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: musicfree-debs-arm64
          path: |
            out/**/*.deb
            **/out/**/*.deb
            *.deb
